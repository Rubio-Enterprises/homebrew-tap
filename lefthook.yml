# lefthook.yml — git hooks orchestration. Thin remotes STUB: the hook bodies
# live once in `standards`' `lefthook/*.yml` and are fetched at hook time from
# the `stable` channel (canary-ring repos resolve `canary` via their own stub —
# not templated here). This replaces the per-archetype hook rendering that used
# to bake every hook into this file. See standards `lefthook/README.md`.
#
# Hook activation note: lefthook installs into .git/hooks/ by default. If a
# developer's global `core.hooksPath` points at a dispatcher (the org's
# chezmoi-managed ~/.config/git/hooks pattern), the dispatcher delegates to the
# per-repo lefthook binary. No repo-side `core.hooksPath` override is required —
# repo-local `.githooks/` directories are banned by `check.sh` to keep the
# dispatcher path canonical across the fleet.
#
# Network-first with lefthook's own cached-copy offline fallback
# (`.git/info/lefthook-remotes/`); the local standards clone is the emergency
# source. `refetch_frequency: 24h` bounds staleness; a plain `lefthook install`
# force-refreshes. lefthook must stay a mise/PATH binary, never an npm install.
#
# Fork deltas: these remote configs hardcode `stage_fixed: true` (non-fork
# default). Fork repos (is_fork: true) that must not auto-stage upstream-pristine
# formatter rewrites set `stage_fixed: false` per hook in `lefthook-local.yml`,
# which overrides remote configs (the highest-priority overlay). Any other
# fork-local hook override also belongs in `lefthook-local.yml`.
remotes:
  - git_url: https://github.com/Rubio-Enterprises/standards.git
    ref: stable
    refetch_frequency: 24h
    configs:
      - lefthook/base.yml
      - lefthook/brew.yml
