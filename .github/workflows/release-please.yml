# release-please: opens / updates a release PR on every push to main.
# When the release PR is merged, release-please tags + creates a GitHub release.
# Per-stack release-types are configured in release-please-config.json.

name: release-please
# `on:` is quoted to satisfy `yaml[truthy]` (yamllint + ansible-lint): without
# quotes, YAML 1.1 parsers fold `on` into the boolean `On`. GitHub Actions
# resolves the key by name regardless, and actionlint accepts both forms.
"on":
  push:
    branches: [main]

permissions:
  contents: write # tag + create release
  pull-requests: write # open / update the release PR

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Mint release-please App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          # Use a GitHub App token, not GITHUB_TOKEN, so release PR workflows
          # run immediately instead of waiting for manual "Approve workflows".
          token: ${{ steps.app-token.outputs.token }}
          # Defaults to release-please-config.json + .release-please-manifest.json
          # at the repo root — both are Copier-synced into every consumer repo.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
