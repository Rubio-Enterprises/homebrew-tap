name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@64bb52ce84da6455bdbd6df88ac86151ba2ff16c # main
        with:
          token: ${{ github.token }}

      - name: Audit formulas
        run: brew audit --formula --tap rubio-enterprises/tap

      - name: Audit casks
        run: brew audit --cask --tap rubio-enterprises/tap

      - name: Style check
        run: brew style rubio-enterprises/tap

      - name: Livecheck (casks)
        run: brew livecheck --cask --tap rubio-enterprises/tap
