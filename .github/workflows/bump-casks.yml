name: Bump casks

on:
  schedule:
    - cron: "0 9 1 * *"  # 1st of every month at 9 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@841d750a0ed9262d3c3ca31f2173974696bc261a # main
        with:
          token: ${{ github.token }}

      - name: Audit casks
        run: brew audit --cask --tap rubio-enterprises/tap

      - name: Style check
        run: brew style --cask rubio-enterprises/tap/syntax-highlight rubio-enterprises/tap/qlmarkdown

      - name: Bump outdated casks (write-only)
        run: |
          outdated=$(brew livecheck --tap rubio-enterprises/tap --json \
            | jq -r '.[] | select(.version.outdated == true) | .cask')
          if [ -z "$outdated" ]; then
            echo "All casks are up to date."
            exit 0
          fi
          for cask in $outdated; do
            echo "Bumping $cask..."
            brew bump-cask-pr --write-only --no-audit --no-style "rubio-enterprises/tap/$cask"
          done

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: bump cask versions"
          branch: auto-bump-casks
          title: "Bump cask versions"
          body: |
            Automated monthly version bump detected by `brew livecheck`.

            Verify the updated versions and SHA256 hashes before merging.
          delete-branch: true
